<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Travel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; margin: 0; overflow: hidden; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        #stars { position: absolute; inset: 0; z-index: -1; }
        .content { z-index: 10; position: relative; }
        .fade-in { animation: fadeIn 3s ease-in; }
        @keyframes fadeIn { 0% { opacity: 0; letter-spacing: 10px; } 100% { opacity: 1; letter-spacing: normal; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
    <canvas id="stars"></canvas>
    <div class="content text-center fade-in">
        <h1 class="text-6xl font-light tracking-widest mb-4">/dev/null</h1>
        <h2 class="text-xl text-gray-400 mb-12 uppercase tracking-widest">The Ultimate Getaway</h2>
        <p class="max-w-lg mx-auto text-gray-300 font-light leading-relaxed mb-12">
            Experience the profound serenity of absolute nothingness. Leave your data, your worries, and your physical form behind. Book a one-way trip to the void.
        </p>
        <button onclick="bookTrip()" class="px-8 py-3 bg-transparent border border-white hover:bg-white hover:text-black transition duration-500 uppercase tracking-widest text-sm">Initiate Deletion sequence</button>
    </div>

    <script>
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const stars = Array(200).fill().map(() => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5, speed: Math.random()*0.5 }));

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
                s.x -= s.speed; if(s.x < 0) s.x = canvas.width;
            });
            requestAnimationFrame(draw);
        }
        draw();

        function bookTrip() {
            document.body.innerHTML = '<div class="flex items-center justify-center h-screen"><h1 class="text-4xl fade-in font-mono">Farewell.</h1></div>';
            setTimeout(() => window.close(), 3000);
        }
    </script>
</body>
</html>
