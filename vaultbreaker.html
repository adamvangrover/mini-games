<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Breaker: System Override</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Courier New', Courier, monospace; user-select: none; color: #0f0; }
        #canvas-container { width: 100vw; height: 100vh; display: block; position: absolute; top:0; left:0; z-index: 1;}

        /* CRT Terminal Effect */
        #crt {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
            box-shadow: inset 0 0 100px rgba(0,255,0,0.1);
        }

        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: #000;
            transition: opacity 0.5s;
        }

        .terminal-box {
            border: 2px solid #0f0;
            padding: 30px;
            max-width: 600px;
            background: rgba(0,20,0,0.8);
            box-shadow: 0 0 15px #0f0;
            text-shadow: 0 0 5px #0f0;
        }

        h1 { margin: 0 0 20px 0; font-size: 2.5em; border-bottom: 2px solid #0f0; padding-bottom: 10px;}
        p { line-height: 1.5; font-size: 1.1em; }

        .cursor-blink {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #0f0;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 5px;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        button {
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 1.2em;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 0 5px #0f0;
        }
        button:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>
    <div id="crt"></div>
    <div id="canvas-container"></div>

    <div id="start-screen">
        <div class="terminal-box">
            <h1>VAULT_BREAKER.EXE</h1>
            <p>Target System: CLASSIFIED_MAINFRAME</p>
            <p>Security Level: MAXIMUM</p>
            <p>Objective: Deduce the 4-color cryptographic sequence.</p>
            <p>Rules:<br>
            - GREEN dot: Correct color, correct position.<br>
            - WHITE dot: Correct color, wrong position.</p>

            <p>AWAITING EXECUTION COMMAND<span class="cursor-blink"></span></p>
            <button onclick="startGame()">> RUN EXPLOIT</button>
        </div>
    </div>

    <script type="module">
        import VaultBreaker from './js/games/vaultBreaker.js';

        window.miniGameHub = {
            showGameOver: (score, cb) => {
                setTimeout(() => {
                    const start = document.getElementById('start-screen');
                    start.style.display = 'flex';
                    start.style.opacity = '1';

                    const box = document.querySelector('.terminal-box');
                    box.innerHTML = `
                        <h1>SESSION TERMINATED</h1>
                        <p>Exploit Value: $${score}</p>
                        <p>DISCONNECTING...<span class="cursor-blink"></span></p>
                        <button onclick="window.location.reload()">> RECONNECT</button>
                    `;
                }, 1000);
            }
        };

        let gameInstance = null;

        window.startGame = async function() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
            }, 500);

            const container = document.getElementById('canvas-container');
            container.innerHTML = '';
            gameInstance = new VaultBreaker();
            await gameInstance.init(container);

            let lastTime = performance.now();
            function loop(time) {
                const dt = (time - lastTime) / 1000;
                lastTime = time;
                if (gameInstance && gameInstance.isActive) {
                    if (gameInstance.update) gameInstance.update(dt);
                    if (gameInstance.draw) gameInstance.draw();
                }
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
