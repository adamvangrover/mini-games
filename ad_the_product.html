<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms of Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #444; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .eye-container { position: relative; width: 150px; height: 100px; margin-bottom: 2rem; }
        .eye { width: 100%; height: 100%; border: 4px solid #444; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .pupil { width: 40px; height: 40px; background: red; border-radius: 50%; box-shadow: 0 0 20px red; animation: scan 3s infinite alternate; }
        @keyframes scan { 0% { transform: translateX(-30px); } 100% { transform: translateX(30px); } }
        .data-stream { position: absolute; top: 0; left: 0; right: 0; height: 100%; overflow: hidden; z-index: -1; opacity: 0.2; pointer-events: none; }
        .stream-text { color: red; font-size: 10px; word-wrap: break-word; line-height: 1; }
    </style>
</head>
<body>
    <div class="data-stream" id="stream"></div>

    <div class="eye-container">
        <div class="eye"><div class="pupil"></div></div>
    </div>

    <h1 class="text-3xl text-red-600 tracking-widest mb-4 font-bold uppercase">If it's free...</h1>
    <h2 class="text-xl text-white mb-8">YOU ARE THE PRODUCT.</h2>

    <p class="text-sm max-w-md text-center mb-8">
        We are currently harvesting your browsing history, keystroke dynamics, and retinal patterns. Thank you for your cooperation.
    </p>

    <div class="flex gap-4">
        <button onclick="accept()" class="px-8 py-2 bg-red-900 text-white hover:bg-red-700 border border-red-500 rounded">I Accept</button>
        <button onclick="window.close()" class="px-8 py-2 bg-transparent text-gray-500 hover:text-white border border-gray-700 rounded">Flee</button>
    </div>

    <script>
        const stream = document.getElementById('stream');
        setInterval(() => {
            const chars = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let txt = '';
            for(let i=0; i<100; i++) txt += chars[Math.floor(Math.random()*chars.length)];
            stream.innerHTML = `<div class="stream-text">${txt}</div>` + stream.innerHTML;
            if(stream.children.length > 50) stream.removeChild(stream.lastChild);
        }, 100);

        function accept() {
            document.body.innerHTML = '<h1 class="text-6xl text-red-600 font-bold mt-32 text-center">DATA ACQUIRED.</h1>';
            setTimeout(() => window.close(), 2000);
        }
    </script>
</body>
</html>
