<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Neon Arcade!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050510; color: white; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        .neon-text { text-shadow: 0 0 10px #f0f, 0 0 20px #f0f, 0 0 40px #f0f; }
        .grid-bg {
            position: absolute; inset: 0; background-image: linear-gradient(#f0f 1px, transparent 1px), linear-gradient(90deg, #f0f 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.1; transform: perspective(500px) rotateX(60deg) translateY(-100px); animation: gridMove 2s linear infinite; z-index: -1;
        }
        @keyframes gridMove { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(50px); } }
        .coin-spin { animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotateY(360deg); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen relative">
    <div class="grid-bg"></div>
    <div class="z-10 text-center p-8 bg-black/60 border border-fuchsia-500 rounded-xl backdrop-blur-sm max-w-2xl">
        <h1 class="text-6xl font-bold mb-6 neon-text text-white">NEON ARCADE PREMIUM</h1>
        <div class="text-6xl text-yellow-400 mb-6 coin-spin">🪙</div>
        <h2 class="text-2xl mb-8 text-cyan-400 font-bold">UPGRADE YOUR EXPERIENCE</h2>
        <ul class="text-lg text-left space-y-4 mb-8 text-gray-300">
            <li><span class="text-green-400">✓</span> Unlock the Secret Cyber-Vault</li>
            <li><span class="text-green-400">✓</span> 10,000 Bonus Neon Coins</li>
            <li><span class="text-green-400">✓</span> Exclusive 'Glitch' Player Avatar</li>
        </ul>
        <button onclick="window.close()" class="px-10 py-4 bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-bold rounded-full border-2 border-white shadow-[0_0_15px_#f0f] transition-all transform hover:scale-105">SUBSCRIBE NOW FOR 999.99 CR</button>
    </div>
</body>
</html>
