<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download RAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }
        .glitch {
            animation: glitch 1s linear infinite;
        }
        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
            62% { transform: translate(0,0) skew(5deg); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-900 to-cyan-900">
    <div class="hero">
        <h1 class="text-6xl font-bold mb-4 glitch">Download RAM</h1>
        <h2 class="text-2xl mb-8 text-gray-300">Is your PC slow? Download more RAM instantly! (Not a scam)</h2>
        <p class="text-xl max-w-2xl mb-8">Just click the button and watch your computer speed up to infinity and beyond.</p>
        <button onclick="window.close()" class="px-8 py-4 bg-white text-black font-bold rounded hover:bg-gray-200 transition">Return to Reality</button>
    </div>
</body>
</html>
